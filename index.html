<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jai'fore — Admin</title>
  <link rel="stylesheet" href="admin.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- ── LOGIN SCREEN ─────────────────────────────── -->
  <div class="login-screen" id="loginScreen">
    <div class="login-brand">
      <span class="brand-dot"></span>Jai'fore <span class="brand-slash">/</span> admin
    </div>
    <div class="login-card">
      <h1>Access Portal</h1>
      <p class="login-sub">Restricted to authorised personnel only.</p>
      <div class="field-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="admin@jaifore.com"/>
      </div>
      <div class="field-group">
        <label>Password <span class="toggle-pw" id="togglePw">show</span></label>
        <input type="password" id="loginPassword" placeholder="••••••••"/>
      </div>
      <p class="login-error" id="loginError"></p>
      <button class="btn-primary" id="loginBtn">
        <span id="loginBtnText">Enter</span>
        <span class="spinner hidden" id="loginSpinner"></span>
      </button>
    </div>
  </div>

  <!-- ── DASHBOARD ─────────────────────────────────── -->
  <div class="dashboard hidden" id="dashboard">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
       <img src="../logo/rooted2.jpg" alt="Jai'fore" class="sidebar-logo"/>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-item active" data-tab="overview">
          <span class="nav-icon">▦</span> Overview
        </button>
        <button class="nav-item" data-tab="products">
          <span class="nav-icon">◈</span> Products
        </button>
        <button class="nav-item" data-tab="orders">
          <span class="nav-icon">◎</span> Orders
        </button>
        <button class="nav-item" data-tab="transactions">
          <span class="nav-icon">◆</span> Transactions
        </button>
        <button class="nav-item" data-tab="users">
          <span class="nav-icon">◉</span> Users
        </button>
      </nav>
      <button class="btn-logout" id="logoutBtn">⏻ Logout</button>
    </aside>

    <!-- Main -->
    <main class="main">

      <!-- Header -->
      <div class="main-header">
        <div>
          <h2 class="main-title" id="mainTitle">Overview</h2>
          <p class="main-sub" id="adminName"></p>
        </div>
      </div>

      <!-- ── OVERVIEW TAB ── -->
      <section class="tab active" id="tab-overview">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">Total Products</div>
            <div class="stat-value" id="statProducts">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Total Orders</div>
            <div class="stat-value" id="statOrders">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Total Revenue</div>
            <div class="stat-value" id="statRevenue">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Total Users</div>
            <div class="stat-value" id="statUsers">—</div>
          </div>
        </div>
      </section>

      <!-- ── PRODUCTS TAB ── -->
      <section class="tab hidden" id="tab-products">
        <div class="tab-toolbar">
          <button class="btn-primary small" id="openAddProduct">+ Add Product</button>
        </div>

        <!-- Add/Edit Form -->
        <div class="form-panel hidden" id="productForm">
          <h3 id="productFormTitle">Add Product</h3>
          <div class="form-grid">
            <div class="field-group">
              <label>Name</label>
              <input type="text" id="pName" placeholder="Product name"/>
            </div>
            <div class="field-group">
              <label>Price ($USD)</label>
              <input type="number" id="pPrice" placeholder="0.00"/>
            </div>
            <div class="field-group">
              <label>Category</label>
              <select id="pCategory">
                <option value="">— Select Category —</option>
                <option value="Apparels & Merchandise">Apparels & Merchandise</option>
                <option value="Graphic Design">Graphic Design</option>
                <option value="Web Development">Web Development</option>
              </select>
            </div>
            <div class="field-group">
              <label>Image URL</label>
              <input type="text" id="pImage" placeholder="https://..."/>
            </div>
            <div class="field-group full">
              <label>Description</label>
              <textarea id="pDesc" placeholder="Product description..." rows="3"></textarea>
            </div>
            <div class="field-group">
              <label>In Stock</label>
              <select id="pStock">
                <option value="true">Yes</option>
                <option value="false">No</option>
              </select>
            </div>
          </div>
          <div class="form-actions">
            <button class="btn-primary small" id="saveProductBtn">Save Product</button>
            <button class="btn-ghost small" id="cancelProductBtn">Cancel</button>
          </div>
          <p class="form-msg" id="productMsg"></p>
        </div>

        <div class="table-wrap">
          <table class="data-table" id="productsTable">
            <thead>
              <tr>
                <th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th>Actions</th>
              </tr>
            </thead>
            <tbody id="productsBody"></tbody>
          </table>
        </div>
      </section>

      <!-- ── ORDERS TAB ── -->
      <section class="tab hidden" id="tab-orders">
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>ID</th><th>Customer</th><th>Total</th><th>Status</th><th>Date</th><th>Action</th>
              </tr>
            </thead>
            <tbody id="ordersBody"></tbody>
          </table>
        </div>
      </section>

      <!-- ── TRANSACTIONS TAB ── -->
      <section class="tab hidden" id="tab-transactions">
        <div class="calendar-wrap">
          <div class="cal-header">
            <button class="cal-nav" id="calPrev">&#8592;</button>
            <span class="cal-title" id="calTitle"></span>
            <button class="cal-nav" id="calNext">&#8594;</button>
          </div>
          <div class="cal-grid" id="calGrid"></div>
        </div>
        <div class="tx-detail hidden" id="txDetail">
          <h3 id="txDetailDate"></h3>
          <div class="tx-sections">
            <div>
              <h4>Orders</h4>
              <div id="txOrders"></div>
            </div>
            <div>
              <h4>Payments</h4>
              <div id="txPayments"></div>
            </div>
          </div>
        </div>
      </section>

      <!-- ── USERS TAB ── -->
      <section class="tab hidden" id="tab-users">
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Name</th><th>Email</th><th>Role</th><th>Verified</th><th>Joined</th>
              </tr>
            </thead>
            <tbody id="usersBody"></tbody>
          </table>
        </div>
      </section>

    </main>
  </div>

  <script src="admin.js"></script>
</body>
</html>
